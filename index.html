<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-emerald-50 p-6">
    <div class="bg-white p-6 rounded-xl shadow border border-emerald-200">
        <h2 class="text-xl font-bold mb-4">Pay / Withdraw</h2>
        <input id="upi-id" class="w-full p-2 border rounded mb-2" placeholder="UPI ID or User ID">
        <input id="amount" type="number" class="w-full p-2 border rounded mb-4" placeholder="Amount (₹)">
        
        <button onclick="processTransaction('upi')" class="bg-emerald-600 text-white px-4 py-2 rounded">Withdraw via UPI</button>
        <button onclick="processTransaction('user')" class="bg-emerald-700 text-white px-4 py-2 rounded">Send to User</button>
    </div>

    <div class="mt-8">
        <h3 class="font-bold mb-4">Transaction History</h3>
        <ul id="history" class="bg-white p-4 rounded shadow"></ul>
    </div>

    <script>
        async function processTransaction(type) {
            const data = {
                sender: "CurrentUser",
                recipient: document.getElementById('upi-id').value,
                amount: document.getElementById('amount').value,
                type: type
            };
            
            const res = await fetch('/api/transfer', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            alert("Request submitted to Bot!");
        }
    </script>
</body>
</html>
